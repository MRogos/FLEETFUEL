services:
  - type: web
    name: fleetfuel-vipremium
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fleetfuel-db
          property: connectionString

databases:
  - name: fleetfuel-db
    databaseName: fleetfuel
    user: fleetfuel
    region: oregon
    plan: free
